spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: product-services
          uri: lb://PRODUCT-SERVICES
          predicates:
            - Path=/api/product/**
        - id: order-services
          uri: lb://ORDER-SERVICES
          predicates:
            - Path=/api/order/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

server:
  port: 8081
